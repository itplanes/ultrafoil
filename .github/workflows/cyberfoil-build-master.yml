name: Build UltraFoil (master)

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkita64:latest

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Build
        shell: bash
        run: |
          set -euo pipefail
          start_ts=$(date +%s)
          dkp-pacman -S --noconfirm --needed switch-ntfs-3g switch-lwext4
          make -j"$(nproc)" RELEASE=1

          end_ts=$(date +%s)
          duration=$((end_ts - start_ts))

          if [ -f "./ultrafoil.nro" ]; then
            nro_status="present"
            nro_size=$(stat -c%s "./ultrafoil.nro" 2>/dev/null || stat -f%z "./ultrafoil.nro")
          else
            nro_status="missing"
            nro_size="0"
          fi

          {
            echo "## Build Summary"
            echo "- Commit: ${GITHUB_SHA}"
            echo "- Runner: $(uname -a)"
            echo "- Duration: ${duration}s"
            echo "- Output: ultrafoil.nro (${nro_status}, ${nro_size} bytes)"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload ultrafoil.nro artifact
        uses: actions/upload-artifact@v4
        with:
          name: ultrafoil-master-nro
          path: ./ultrafoil.nro
          if-no-files-found: error
