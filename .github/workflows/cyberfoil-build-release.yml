name: Build UltraFoil (release)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkita64:latest

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Download prebuilt lib.a from CyberFoil_Blob release
        shell: bash
        env:
          BLOB_REPO_TOKEN: ${{ secrets.BLOB_REPO_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${BLOB_REPO_TOKEN:-}" ]; then
            echo "WARNING: Missing secret BLOB_REPO_TOKEN; continuing without prebuilt/lib.a"
            exit 0
          fi

          owner="${GITHUB_REPOSITORY_OWNER}"
          blob_repo="CyberFoil_Blob"
          asset_name="lib.a"
          api_release="https://api.github.com/repos/${owner}/${blob_repo}/releases/latest"

          release_json="$(curl -fsSL \
            -H "Authorization: Bearer ${BLOB_REPO_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "${api_release}")"

          asset_id="$(python3 -c 'import json,sys; d=json.load(sys.stdin); n="lib.a"; print(next((str(a["id"]) for a in d.get("assets",[]) if a.get("name")==n), ""))' <<< "${release_json}")"
          if [ -z "${asset_id}" ]; then
            echo "WARNING: Asset ${asset_name} not found in latest ${blob_repo} release; continuing without prebuilt/lib.a"
            exit 0
          fi

          mkdir -p prebuilt
          curl -fsSL -L \
            -H "Authorization: Bearer ${BLOB_REPO_TOKEN}" \
            -H "Accept: application/octet-stream" \
            "https://api.github.com/repos/${owner}/${blob_repo}/releases/assets/${asset_id}" \
            -o prebuilt/lib.a

          if [ ! -s prebuilt/lib.a ]; then
            echo "WARNING: Downloaded prebuilt/lib.a is missing or empty; continuing without prebuilt/lib.a"
            rm -f prebuilt/lib.a
          fi

      - name: Build + verify expected NRO name/location
        shell: bash
        run: |
          set -euo pipefail

          dkp-pacman -S --noconfirm --needed switch-ntfs-3g switch-lwext4
          make -j"$(nproc)" RELEASE=1

          # Your Makefile outputs ./ultrafoil.nro (TARGET := ultrafoil)
          if [ ! -f "./ultrafoil.nro" ]; then
            echo "ERROR: Expected ./ultrafoil.nro not found"
            echo "Debug: any .nro files present?"
            find . -type f -name '*.nro' -print -exec ls -l {} \; || true
            exit 1
          fi

          # Ensure there aren't multiple .nro files
          COUNT="$(find . -type f -name '*.nro' | wc -l | tr -d ' ')"
          if [ "$COUNT" -ne 1 ]; then
            echo "ERROR: Expected exactly 1 .nro file, found $COUNT"
            find . -type f -name '*.nro' -print -exec ls -l {} \;
            exit 1
          fi

      - name: Package ultrafoil.zip (switch/UltraFoil/ultrafoil.nro)
        shell: bash
        run: |
          set -euo pipefail

          rm -rf dist ultrafoil.zip
          mkdir -p dist/switch/UltraFoil
          cp -v ./ultrafoil.nro dist/switch/UltraFoil/ultrafoil.nro

          # Create the zip using Python (no dependency on 'zip' being installed)
          python3 - <<'PY'
          import os, zipfile
          zip_name = "ultrafoil.zip"
          base_dir = "dist"
          with zipfile.ZipFile(zip_name, "w", compression=zipfile.ZIP_DEFLATED) as z:
              for root, _, files in os.walk(os.path.join(base_dir, "switch")):
                  for f in files:
                      full_path = os.path.join(root, f)
                      arcname = full_path[len(base_dir)+1:]  # strip "dist/"
                      z.write(full_path, arcname)
          print("Created", zip_name)
          PY

          echo "---- package ----"
          ls -lah ultrafoil.zip
          python3 - <<'PY'
          import zipfile
          with zipfile.ZipFile("ultrafoil.zip") as z:
              print("\n".join(z.namelist()))
          PY

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: UltraFoil
          path: ultrafoil.zip
          if-no-files-found: error

      - name: Publish GitHub Release (auto notes)
        uses: softprops/action-gh-release@v2
        with:
          files: ultrafoil.zip
          generate_release_notes: true
